<!DOCTYPE html>
<html>
<head>
    <title>Anime Discussion Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        li { margin-bottom: 10px; }
        button { margin-left: 5px; }
    </style>
</head>
<body>

<h2>Anime Discussion Chat</h2>

<input id="roomId" placeholder="Discussion Room ID" />
<button id="joinBtn">Join Room</button>

<p id="status" style="color: green;"></p>
<hr>
<input id="message" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
<ul id="chat"></ul>

<script>
    let stompClient = null;
    let currentRoomId = null;
    let subscription = null;
    let currentUserId = null;
    let isAdmin = false;

    async function connect() {
        return new Promise((resolve, reject) => {
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, async () => {
                console.log("Connected to WebSocket");
                try {
                    const res = await fetch("http://localhost:8080/api/users/self", { credentials: "include" });
                    const user = await res.json();
                    currentUserId = Number(user.id);
                    isAdmin = user.role?.toUpperCase() === "ADMIN";
                    console.log("User loaded:", user.username, "Admin:", isAdmin);
                    resolve();
                } catch (err) {
                    console.error("Failed to fetch user info:", err);
                    reject(err);
                }
            });
        });
    }

    async function joinRoom() {
        if (!currentUserId) return alert("User info not loaded yet, try again in 1-2 seconds");
        const roomId = document.getElementById("roomId").value.trim();
        if (!roomId) return alert("Enter a room ID");

        if (subscription) subscription.unsubscribe();

        currentRoomId = roomId;
        document.getElementById("chat").innerHTML = "";
        document.getElementById("status").innerText = "Joined Discussion Room #" + roomId;

        try {
            const response = await fetch(`http://localhost:8080/api/messages/discussion/${roomId}`, { credentials: "include" });
            const messages = await response.json();
            messages.forEach(m => appendMessage(m));

            subscription = stompClient.subscribe(
                `/topic/chat/${roomId}`,
                msg => handleEvent(JSON.parse(msg.body))
            );
        } catch (err) {
            console.error("Failed to load messages:", err);
        }
    }

    // FIX 1: roomId is now in the path, not the body
    function sendMessage() {
        const content = document.getElementById("message").value.trim();
        if (!stompClient || !stompClient.connected) return alert("Not connected yet");
        if (!currentRoomId) return alert("Join a room first");
        if (!content) return;

        stompClient.send(`/app/chat.send/${currentRoomId}`, {}, JSON.stringify({
            content: content
        }));

        document.getElementById("message").value = "";
    }

    function appendMessage(message) {
        const li = document.createElement("li");
        li.id = "msg-" + message.id;

        const textNode = document.createTextNode(
            message.sender.username + ": " + message.content
        );
        li.appendChild(textNode);

        const senderId = Number(message.sender.id);

        if (senderId === currentUserId || isAdmin) {
            const editBtn = document.createElement("button");
            editBtn.innerText = "Edit";
            editBtn.onclick = () => editMessage(message.id);

            const deleteBtn = document.createElement("button");
            deleteBtn.innerText = "Delete";
            deleteBtn.onclick = () => deleteMessage(message.id);

            li.appendChild(editBtn);
            li.appendChild(deleteBtn);
        }

        document.getElementById("chat").appendChild(li);
    }

    function handleEvent(event) {
        if (event.type === "CREATE") {
            appendMessage(event.message);
        }
        if (event.type === "EDIT") {
            const li = document.getElementById("msg-" + event.message.id);
            if (li) {
                li.firstChild.textContent =
                    event.message.sender.username + ": " + event.message.content;
            }
        }
        if (event.type === "DELETE") {
            const li = document.getElementById("msg-" + event.messageId);
            if (li) li.remove();
        }
    }

    // FIX 2: connection guard on delete
    function deleteMessage(id) {
        if (!stompClient || !stompClient.connected) return alert("Not connected");
        stompClient.send("/app/chat.delete", {}, JSON.stringify({ messageId: id }));
    }

    // FIX 3: connection guard on edit
    function editMessage(id) {
        if (!stompClient || !stompClient.connected) return alert("Not connected");
        const newContent = prompt("Edit message:");
        if (!newContent) return;
        stompClient.send("/app/chat.edit", {}, JSON.stringify({ messageId: id, content: newContent }));
    }

    (async () => {
        await connect();
        document.getElementById("joinBtn").addEventListener("click", joinRoom);
    })();
</script>

</body>
</html>
